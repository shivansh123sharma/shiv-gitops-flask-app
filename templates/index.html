<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog | GitOps Live</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); line-height: 1.6; }

        /* Navbar Styling */
        nav {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; color: var(--accent); }
        .node-info { font-family: monospace; font-size: 0.8rem; background: #0f172a; padding: 5px 12px; border-radius: 6px; border: 1px solid #334155; }

        /* Hero Section */
        header {
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
        }

        header h1 { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(to right, #fff, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--text-dim); max-width: 600px; margin: 0 auto; }

        /* Main Container */
        .container { max-width: 1100px; margin: -40px auto 40px; padding: 0 20px; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid #334155; text-align: center; }
        .stat-card span { display: block; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .stat-card strong { font-size: 1.5rem; color: var(--accent); }

        /* Products Grid */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 30px; 
            border: 1px solid #334155; 
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card h3 { font-size: 1.4rem; margin-bottom: 15px; }
        .price-tag { font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 20px; }
        .stock-label { font-size: 0.85rem; padding: 6px 12px; background: rgba(34, 197, 94, 0.1); color: #4ade80; border-radius: 100px; display: inline-flex; align-items: center; gap: 6px; }

        /* Footer */
        footer { text-align: center; padding: 40px; color: var(--text-dim); border-top: 1px solid #1e293b; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">GIT-OPS PROD</div>
        <div class="node-info">POD_ID: <span id="pod-id">loading...</span></div>
    </nav>

    <header>
        <h1>Cloud-Native Catalog</h1>
        <p>Managed by ArgoCD on AWS m7i-flex.large Instances</p>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <span>Status</span>
                <strong>Active</strong>
            </div>
            <div class="stat-card">
                <span>Region</span>
                <strong>AWS-VPC</strong>
            </div>
            <div class="stat-card">
                <span>Sync</span>
                <strong style="color: #4ade80;">Healthy</strong>
            </div>
        </div>

        <div class="section-header">
            <h2>Inventory Items</h2>
        </div>

        <div class="cards" id="products-container">
            </div>
    </div>

    <footer>
        &copy; 2026 Shivansh-GitOps-Infrastructure | Built with Flask & Kubernetes
    </footer>

    <script>
        // Fetch Node/Pod Info from the Health endpoint
        fetch('/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('pod-id').textContent = data.hostname;
            });

        // Fetch Products Data
        fetch('/products')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('products-container');
                container.innerHTML = data.products.map(p => `
                    <div class="card">
                        <h3>${p.name}</h3>
                        <div class="price-tag">₹${p.price}</div>
                        <div class="stock-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            ${p.stock} units available
                        </div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('products-container').innerHTML = `<p style="color:red">Failed to fetch inventory from API cluster.</p>`;
            });
    </script>
</body>
</html>
