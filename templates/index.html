<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
        .header { background: #1e293b; padding: 20px 40px; border-bottom: 2px solid #3b82f6; }
        .header h1 { color: #3b82f6; font-size: 24px; }
        .header p { color: #94a3b8; font-size: 14px; }
        .status { display: inline-block; background: #22c55e; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-top: 8px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-title { font-size: 20px; color: #94a3b8; margin-bottom: 20px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
        .card h3 { color: #f1f5f9; font-size: 18px; margin-bottom: 8px; }
        .card .price { color: #3b82f6; font-size: 22px; font-weight: bold; margin: 12px 0; }
        .card .stock { color: #94a3b8; font-size: 14px; }
        .stock-badge { display: inline-block; background: #166534; color: #86efac; padding: 4px 10px; border-radius: 6px; font-size: 12px; }
        .endpoints { margin-top: 40px; }
        .endpoint { background: #1e293b; border-radius: 8px; padding: 16px 20px; margin-bottom: 12px; border-left: 4px solid #3b82f6; display: flex; align-items: center; gap: 16px; }
        .method { background: #1d4ed8; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .path { color: #e2e8f0; font-family: monospace; font-size: 15px; }
        .desc { color: #94a3b8; font-size: 13px; margin-left: auto; }
        .hostname { color: #94a3b8; font-size: 13px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ Product Catalog API</h1>
        <p class="hostname">Running on pod: <strong id="hostname"></strong></p>
        <span class="status">● HEALTHY</span>
    </div>

    <div class="container">
        <p class="section-title">📦 Products</p>
        <div class="cards" id="products"></div>

        <div class="endpoints">
            <p class="section-title" style="margin-top:40px">🔌 API Endpoints</p>

            <div class="endpoint">
                <span class="method">GET</span>
                <span class="path">/</span>
                <span class="desc">Service info</span>
            </div>

            <div class="endpoint">
                <span class="method">GET</span>
                <span class="path">/health</span>
                <span class="desc">Health check</span>
            </div>

            <div class="endpoint">
                <span class="method">GET</span>
                <span class="path">/products</span>
                <span class="desc">List all products</span>
            </div>
        </div>
    </div>

    <script>
        // Fetch hostname
        fetch('/health')
            .then(r => r.json())
            .then(d => {
                document.getElementById('hostname').textContent = d.hostname;
            })
            .catch(err => console.error('Health API error:', err));

        // Fetch products
        fetch('/products')
            .then(r => r.json())
            .then(d => {
                const container = document.getElementById('products');
                let html = "";

                d.products.forEach(p => {
                    html += `
                    <div class="card">
                        <h3>${p.name}</h3>
                        <div class="price">₹${p.price}</div>
                        <div class="stock">
                            <span class="stock-badge">✓ In Stock</span>
                            <span style="margin-left:8px">${p.stock} units</span>
                        </div>
                    </div>`;
                });

                container.innerHTML = html;
            })
            .catch(err => console.error('Products API error:', err));
    </script>
</body>
</html>
